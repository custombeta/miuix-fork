name: Build Miuix AARs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Build AARs
        run: |
          ./gradlew :miuix-ui:assemble \
                    :miuix-preference:assemble \
                    :miuix-icons:assemble \
                    :miuix-blur:assemble \
                    :miuix-navigation3-ui:assemble
                    
      - name: Find AARs
        run: find . -name "*.aar" 2>/dev/null
      
      - name: Collect AARs
        run: |
          mkdir -p artifacts
          cp miuix-ui/build/outputs/aar/*-release.aar artifacts/miuix-ui.aar
          cp miuix-preference/build/outputs/aar/*-release.aar artifacts/miuix-preference.aar
          cp miuix-icons/build/outputs/aar/*-release.aar artifacts/miuix-icons.aar
          cp miuix-blur/build/outputs/aar/*-release.aar artifacts/miuix-blur.aar
          cp miuix-navigation3-ui/build/outputs/aar/*-release.aar artifacts/miuix-navigation3-ui.aar

      - name: Upload AARs
        uses: actions/upload-artifact@v4
        with:
          name: miuix-aars
          path: artifacts/
